<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>meu formulario completo</title>
</head>
<body>

<h2>as Informaçoes basicas</h2>

<label>Nome completo:</label><br>
<input type="text" name="nome"><br><br>

<label>E-mail:</label><br>
<input type="email" name="email"><br><br>

<label>Senha:</label><br>
<input type="password" name="senha"><br><br>


<h2> os Dados pessoais</h2>

<label>Data de nascimento:</label><br>
<input type="date" name="data"><br><br>

<label>Idade:</label><br>
<input type="number" name="idade" min="0" max="120"><br><br>

<label>Cor favorita:</label><br>
<input type="color" name="cor"><br><br>


<h2>Preferências</h2>

<label>Gênero:</label><br>
<input type="radio" name="genero" value="masculino"> Masculino<br>
<input type="radio" name="genero" value="feminino"> Feminino<br>
<input type="radio" name="genero" value="outro"> Outro<br><br>

<label>Interesses:</label><br>
<input type="checkbox" name="interesse" value="esporte"> Esporte<br>
<input type="checkbox" name="interesse" value="musica"> Música<br>
<input type="checkbox" name="interesse" value="tecnologia"> Tecnologia<br>
<input type="checkbox" name="interesse" value="arte"> Arte<br><br>


<h2>inputs</h2>

<label>Upload de arquivo:</label><br>
<input type="file" name="arquivo"><br><br>


<input type="submit" value="Enviar">
